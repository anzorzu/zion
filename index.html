<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ZION">
<title>ZION</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

:root {
  --green: #00ff41;
  --green-dim: #00b32c;
  --green-dark: #003b00;
  --green-glow: rgba(0,255,65,0.15);
  --green-glow-strong: rgba(0,255,65,0.35);
  --black: #000000;
  --dark: #040d04;
  --panel: #020a02;
  --border: rgba(0,255,65,0.18);
  --text-dim: #007a1f;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height:100%; width:100%;
  overflow:hidden;
  background:var(--black);
  color:var(--green);
  font-family:'Share Tech Mono', monospace;
  -webkit-font-smoothing:antialiased;
  touch-action:manipulation;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);
  pointer-events:none; z-index:9999;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.75) 100%);
  pointer-events:none; z-index:9998;
}

canvas#rain {
  position:fixed; inset:0;
  width:100%; height:100%;
  z-index:0; opacity:0.055;
  pointer-events:none;
}

/* ── SCREENS ── */
.screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  background:var(--dark);
  z-index:1;
  transition:transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
}

.screen.hidden {
  transform:translateX(100%);
  opacity:0;
  pointer-events:none;
}

.status-spacer {
  height:var(--safe-top);
  background:var(--panel);
  min-height:44px;
  flex-shrink:0;
}

/* ── NAVBAR ── */
.navbar {
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  height:52px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}

.navbar-title {
  font-family:'VT323', monospace;
  font-size:26px;
  letter-spacing:4px;
  text-shadow:0 0 12px var(--green), 0 0 30px rgba(0,255,65,0.3);
}

.navbar-btn {
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-dim);
  font-family:'Share Tech Mono', monospace;
  font-size:11px;
  letter-spacing:1px;
  padding:6px 10px;
  cursor:pointer;
  transition:all 0.2s;
  -webkit-appearance:none;
}

.navbar-btn:active { color:var(--green); border-color:var(--green); background:var(--green-glow); }

/* ── LOGIN SCREEN ── */
#screen-login {
  align-items:center;
  justify-content:center;
  gap:0;
  z-index:2;
}

.login-box {
  width:100%;
  max-width:320px;
  padding:0 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.login-logo {
  font-family:'VT323', monospace;
  font-size:64px;
  letter-spacing:8px;
  text-shadow:0 0 20px var(--green), 0 0 60px rgba(0,255,65,0.3);
  text-align:center;
  animation:flicker 5s infinite;
}

@keyframes flicker {
  0%,95%,100%{opacity:1}
  96%{opacity:0.7}
  97%{opacity:1}
  98%{opacity:0.5}
  99%{opacity:1}
}

.login-sub {
  font-size:10px;
  color:var(--text-dim);
  letter-spacing:3px;
  text-align:center;
  margin-top:-10px;
}

.login-input {
  width:100%;
  background:rgba(0,255,65,0.04);
  border:1px solid var(--border);
  border-bottom:1px solid var(--green-dim);
  color:var(--green);
  font-family:'Share Tech Mono', monospace;
  font-size:16px;
  padding:12px 14px;
  outline:none;
  letter-spacing:2px;
  text-align:center;
  text-transform:uppercase;
  -webkit-appearance:none;
  border-radius:0;
}

.login-input::placeholder { color:var(--text-dim); }
.login-input:focus { border-color:var(--green-dim); box-shadow:0 0 12px var(--green-glow); }

.login-btn {
  width:100%;
  background:var(--green-dark);
  border:1px solid var(--green-dim);
  color:var(--green);
  font-family:'VT323', monospace;
  font-size:22px;
  letter-spacing:4px;
  padding:14px;
  cursor:pointer;
  text-shadow:0 0 8px var(--green);
  -webkit-appearance:none;
  border-radius:0;
  transition:all 0.2s;
}

.login-btn:active { box-shadow:0 0 20px var(--green-glow-strong); }

.login-hint {
  font-size:10px;
  color:var(--text-dim);
  letter-spacing:1px;
  text-align:center;
  line-height:1.6;
}

/* ── ROOMS SCREEN ── */
.online-bar {
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

.dot-live {
  width:7px; height:7px;
  background:var(--green);
  border-radius:50%;
  box-shadow:0 0 8px var(--green);
  flex-shrink:0;
  animation:blink 2s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.online-text { font-size:10px; color:var(--text-dim); letter-spacing:2px; }

.rooms-scroll {
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

.room-row {
  display:flex;
  align-items:center;
  padding:16px;
  border-bottom:1px solid rgba(0,255,65,0.07);
  cursor:pointer;
  transition:background 0.15s;
}

.room-row:active { background:var(--green-glow); }

.room-icon {
  width:44px; height:44px;
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-family:'VT323', monospace;
  font-size:22px;
  color:var(--green-dim);
  flex-shrink:0;
  margin-right:12px;
  background:rgba(0,255,65,0.03);
}

.room-info { flex:1; min-width:0; }

.room-name {
  font-size:14px;
  letter-spacing:1.5px;
  color:var(--green);
}

.room-desc {
  font-size:11px;
  color:var(--text-dim);
  margin-top:3px;
}

.room-chevron { color:var(--text-dim); font-size:18px; margin-left:8px; }

.section-label {
  padding:10px 16px 6px;
  font-size:10px;
  color:var(--text-dim);
  letter-spacing:3px;
}

/* ── JOIN ROOM INPUT ── */
.join-bar {
  padding:12px 16px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  gap:8px;
  flex-shrink:0;
}

.join-input {
  flex:1;
  background:rgba(0,255,65,0.04);
  border:1px solid var(--border);
  color:var(--green);
  font-family:'Share Tech Mono', monospace;
  font-size:13px;
  padding:9px 12px;
  outline:none;
  letter-spacing:1px;
  text-transform:uppercase;
  -webkit-appearance:none;
  border-radius:0;
}

.join-input::placeholder { color:var(--text-dim); }
.join-input:focus { border-color:var(--green-dim); box-shadow:0 0 8px var(--green-glow); }

.join-btn {
  background:var(--green-dark);
  border:1px solid var(--green-dim);
  color:var(--green);
  font-family:'VT323', monospace;
  font-size:18px;
  padding:0 14px;
  cursor:pointer;
  -webkit-appearance:none;
  border-radius:0;
}

.join-btn:active { box-shadow:0 0 12px var(--green-glow-strong); }

/* ── CHAT SCREEN ── */
.chat-header-info {
  flex:1;
  text-align:center;
}

.chat-header-name {
  font-family:'VT323', monospace;
  font-size:22px;
  letter-spacing:3px;
  text-shadow:0 0 10px var(--green);
  line-height:1;
}

.chat-header-status {
  font-size:10px;
  color:var(--green-dim);
  letter-spacing:2px;
  margin-top:2px;
}

.messages-scroll {
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:16px 14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg-wrap {
  display:flex;
  flex-direction:column;
  max-width:82%;
  animation:msgIn 0.2s ease-out;
}

@keyframes msgIn {
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

.msg-wrap.sent { align-self:flex-end; align-items:flex-end; }
.msg-wrap.recv { align-self:flex-start; align-items:flex-start; }

.msg-from {
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:2px;
  margin-bottom:3px;
}

.msg-body {
  padding:9px 13px;
  font-size:13px;
  line-height:1.6;
  letter-spacing:0.3px;
  word-break:break-word;
}

.msg-wrap.sent .msg-body {
  background:var(--green-dark);
  border:1px solid var(--green-dim);
  color:var(--green);
  box-shadow:0 0 12px rgba(0,255,65,0.08);
}

.msg-wrap.recv .msg-body {
  background:#020a02;
  border:1px solid var(--border);
  color:#9effa0;
}

.msg-time {
  font-size:9px;
  color:var(--text-dim);
  margin-top:3px;
  letter-spacing:1px;
}

.system-msg {
  text-align:center;
  font-size:10px;
  color:var(--text-dim);
  letter-spacing:2px;
  padding:4px 0;
  font-style:italic;
}

/* Typing */
.typing-row {
  display:flex; align-items:center; gap:8px;
  font-size:10px; color:var(--text-dim);
  letter-spacing:2px;
}

.typing-dots span {
  display:inline-block;
  width:5px; height:5px;
  background:var(--green-dim);
  margin:0 2px;
  animation:blink 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.3s}
.typing-dots span:nth-child(3){animation-delay:.6s}

/* ── INPUT BAR ── */
.input-bar {
  background:var(--panel);
  border-top:1px solid var(--border);
  padding:10px 14px;
  padding-bottom:calc(10px + var(--safe-bottom));
  flex-shrink:0;
}

.input-row {
  display:flex;
  align-items:flex-end;
  gap:8px;
}

.input-prompt-char {
  font-family:'VT323', monospace;
  font-size:22px;
  color:var(--green-dim);
  padding-bottom:5px;
  flex-shrink:0;
}

#chat-input {
  flex:1;
  background:rgba(0,255,65,0.04);
  border:1px solid var(--border);
  color:var(--green);
  font-family:'Share Tech Mono', monospace;
  font-size:14px;
  padding:9px 12px;
  outline:none;
  resize:none;
  min-height:40px;
  max-height:100px;
  -webkit-appearance:none;
  border-radius:0;
  letter-spacing:0.5px;
  line-height:1.4;
}

#chat-input:focus { border-color:var(--green-dim); box-shadow:0 0 10px var(--green-glow); }
#chat-input::placeholder { color:var(--text-dim); }

.send-btn {
  background:var(--green-dark);
  border:1px solid var(--green-dim);
  color:var(--green);
  font-family:'VT323', monospace;
  font-size:20px;
  width:44px; height:40px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  text-shadow:0 0 8px var(--green);
  flex-shrink:0;
  -webkit-appearance:none;
  border-radius:0;
}

.send-btn:active { background:#005a0e; transform:scale(0.95); }

/* ── TOAST ── */
.toast {
  position:fixed;
  bottom:calc(80px + var(--safe-bottom));
  left:50%; transform:translateX(-50%);
  background:var(--panel);
  border:1px solid var(--green-dim);
  box-shadow:0 0 20px var(--green-glow);
  padding:10px 18px;
  font-size:11px;
  letter-spacing:2px;
  color:var(--green);
  z-index:600;
  white-space:nowrap;
  animation:toastIn 0.2s ease-out, toastOut 0.3s ease-in 2.3s forwards;
}

@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0}}

/* ── CONNECTION STATUS ── */
.conn-status {
  text-align:center;
  padding:6px;
  font-size:10px;
  letter-spacing:2px;
  background:rgba(255,0,60,0.1);
  border-bottom:1px solid rgba(255,0,60,0.3);
  color:#ff003c;
  display:none;
  flex-shrink:0;
}

.conn-status.show { display:block; }

.messages-scroll::-webkit-scrollbar { display:none; }
.rooms-scroll::-webkit-scrollbar { display:none; }
</style>
</head>
<body>
<canvas id="rain"></canvas>

<!-- ── LOGIN ── -->
<div class="screen" id="screen-login">
  <div class="login-box">
    <div class="login-logo">ZION</div>
    <div class="login-sub">// SECURE TERMINAL v2.0</div>
    <input class="login-input" id="handle-input" type="text"
      placeholder="ENTER YOUR HANDLE"
      maxlength="16"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
      onkeydown="if(event.key==='Enter')enterSystem()" />
    <button class="login-btn" onclick="enterSystem()">[ ENTER THE MATRIX ]</button>
    <div class="login-hint">
      Придумай ник — это твой позывной.<br>
      Друг должен знать его чтобы написать тебе.
    </div>
  </div>
</div>

<!-- ── ROOMS ── -->
<div class="screen hidden" id="screen-rooms">
  <div class="status-spacer"></div>
  <div class="navbar">
    <div class="navbar-title">ZION</div>
    <button class="navbar-btn" onclick="logout()" style="font-size:10px">EXIT</button>
  </div>
  <div class="online-bar">
    <div class="dot-live"></div>
    <div class="online-text" id="handle-display">—</div>
  </div>
  <div class="join-bar">
    <input class="join-input" id="room-input" type="text"
      placeholder="НАЗВАНИЕ КОМНАТЫ..."
      maxlength="20"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
      onkeydown="if(event.key==='Enter')joinRoom()" />
    <button class="join-btn" onclick="joinRoom()">JOIN</button>
  </div>
  <div class="section-label">// АКТИВНЫЕ КОМНАТЫ</div>
  <div class="rooms-scroll" id="rooms-list"></div>
</div>

<!-- ── CHAT ── -->
<div class="screen hidden" id="screen-chat">
  <div class="status-spacer"></div>
  <div class="navbar">
    <button class="navbar-btn" onclick="leaveRoom()" style="display:flex;align-items:center;gap:4px;font-size:13px">‹ BACK</button>
    <div class="chat-header-info">
      <div class="chat-header-name" id="chat-room-name">—</div>
      <div class="chat-header-status" id="chat-members">—</div>
    </div>
    <button class="navbar-btn" onclick="copyRoomLink()" style="font-size:10px">SHARE</button>
  </div>
  <div class="conn-status" id="conn-status">⚠ RECONNECTING...</div>
  <div class="messages-scroll" id="messages-scroll"></div>
  <div class="input-bar">
    <div class="input-row">
      <span class="input-prompt-char">&gt;_</span>
      <textarea id="chat-input" placeholder="TRANSMIT..." rows="1"
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="sendMsg()">▶</button>
    </div>
  </div>
</div>

<script>
// ── MATRIX RAIN ──────────────────────────────────────
const canvas = document.getElementById('rain');
const ctx = canvas.getContext('2d');
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#%アイウエオカキクケコ';
let drops = [];

function initRain() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops = Array(Math.floor(canvas.width/14)).fill(1);
}

function rain() {
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = '13px Share Tech Mono';
  drops.forEach((y,i) => {
    ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*14, y*14);
    if (y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}

initRain();
setInterval(rain, 60);
window.addEventListener('resize', initRain);

// ── CONFIG ───────────────────────────────────────────
const ABLY_KEY = '2IssHA.MtnLog:_Hc037FOru_C404IhjsmGL02mzztkFiLbbwn95HK9mo';

// ── STATE ────────────────────────────────────────────
let myHandle = '';
let ably = null;
let currentChannel = null;
let currentRoom = '';
let recentRooms = JSON.parse(localStorage.getItem('zion_rooms') || '[]');
let typingTimer = null;
let typingChannel = null;
let membersMap = {};

// ── LOGIN ─────────────────────────────────────────────
function enterSystem() {
  const val = document.getElementById('handle-input').value.trim().toUpperCase().replace(/[^A-Z0-9_]/g,'_');
  if (!val || val.length < 2) { toast('ВВЕДИ НИК (мин. 2 символа)'); return; }
  myHandle = val;
  localStorage.setItem('zion_handle', myHandle);

  // Connect Ably
  ably = new Ably.Realtime({ key: ABLY_KEY, clientId: myHandle });
  ably.connection.on('connected', () => {
    showScreen('screen-rooms');
    document.getElementById('handle-display').textContent = myHandle + ' // ONLINE';
    renderRooms();
  });
  ably.connection.on('disconnected', () => showConnStatus(true));
  ably.connection.on('connected', () => showConnStatus(false));
}

function logout() {
  if (ably) ably.close();
  ably = null; myHandle = '';
  showScreen('screen-login');
  document.getElementById('handle-input').value = '';
}

// ── ROOMS ─────────────────────────────────────────────
function renderRooms() {
  const list = document.getElementById('rooms-list');
  list.innerHTML = '';
  if (!recentRooms.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:11px;letter-spacing:2px;padding:40px 20px;">НЕТ КОМНАТ<br><br>Введи название выше и нажми JOIN</div>';
    return;
  }
  recentRooms.forEach(r => {
    const div = document.createElement('div');
    div.className = 'room-row';
    div.onclick = () => enterRoom(r);
    div.innerHTML = `
      <div class="room-icon">#</div>
      <div class="room-info">
        <div class="room-name">#${r}</div>
        <div class="room-desc">Нажми чтобы войти</div>
      </div>
      <div class="room-chevron">›</div>
    `;
    list.appendChild(div);
  });
}

function joinRoom() {
  const val = document.getElementById('room-input').value.trim().toUpperCase().replace(/[^A-Z0-9_]/g,'_');
  if (!val) { toast('ВВЕДИ НАЗВАНИЕ КОМНАТЫ'); return; }
  document.getElementById('room-input').value = '';
  enterRoom(val);
}

function enterRoom(roomName) {
  currentRoom = roomName;

  // Save to recent
  recentRooms = [roomName, ...recentRooms.filter(r => r !== roomName)].slice(0, 10);
  localStorage.setItem('zion_rooms', JSON.stringify(recentRooms));

  // Subscribe to channel
  if (currentChannel) currentChannel.detach();
  currentChannel = ably.channels.get('zion:' + roomName);
  typingChannel = ably.channels.get('zion:' + roomName + ':typing');

  document.getElementById('chat-room-name').textContent = '#' + roomName;
  document.getElementById('messages-scroll').innerHTML = '';
  showScreen('screen-chat');

  // Subscribe to messages
  currentChannel.subscribe('msg', (msg) => {
    const d = msg.data;
    appendMessage(d.handle, d.text, d.time, d.handle === myHandle);
  });

  // Subscribe to system messages
  currentChannel.subscribe('system', (msg) => {
    appendSystem(msg.data.text);
  });

  // Subscribe to typing
  typingChannel.subscribe('typing', (msg) => {
    if (msg.data.handle !== myHandle) showTyping(msg.data.handle);
  });

  // Presence
  currentChannel.presence.enter({ handle: myHandle });
  currentChannel.presence.subscribe(() => updateMembers());
  updateMembers();

  // Announce join
  currentChannel.publish('system', { text: myHandle + ' joined the channel' });

  setTimeout(() => document.getElementById('chat-input').focus(), 350);
}

function leaveRoom() {
  if (currentChannel) {
    currentChannel.publish('system', { text: myHandle + ' left the channel' });
    currentChannel.presence.leave();
    currentChannel.detach();
    currentChannel = null;
  }
  showScreen('screen-rooms');
  renderRooms();
}

function updateMembers() {
  if (!currentChannel) return;
  currentChannel.presence.get((err, members) => {
    if (err || !members) return;
    const count = members.length;
    document.getElementById('chat-members').textContent = count + ' ONLINE // E2E';
  });
}

// ── MESSAGES ─────────────────────────────────────────
function appendMessage(handle, text, time, isMine) {
  hideTyping();
  const scroll = document.getElementById('messages-scroll');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (isMine ? 'sent' : 'recv');
  wrap.innerHTML = `
    <div class="msg-from">${isMine ? 'YOU' : handle}</div>
    <div class="msg-body">${esc(text)}</div>
    <div class="msg-time">${time}</div>
  `;
  scroll.appendChild(wrap);
  scroll.scrollTop = scroll.scrollHeight;
}

function appendSystem(text) {
  const scroll = document.getElementById('messages-scroll');
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = '// ' + text;
  scroll.appendChild(div);
  scroll.scrollTop = scroll.scrollHeight;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── SEND ─────────────────────────────────────────────
function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text || !currentChannel) return;

  const time = new Date().toTimeString().slice(0,5);
  currentChannel.publish('msg', { handle: myHandle, text, time });

  inp.value = '';
  inp.style.height = 'auto';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); return; }
  // Typing indicator
  if (typingChannel) {
    typingChannel.publish('typing', { handle: myHandle });
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── TYPING ───────────────────────────────────────────
let typingTimeout = null;

function showTyping(handle) {
  clearTimeout(typingTimeout);
  let el = document.getElementById('typing-ind');
  if (!el) {
    el = document.createElement('div');
    el.id = 'typing-ind';
    el.className = 'typing-row';
    document.getElementById('messages-scroll').appendChild(el);
  }
  el.innerHTML = `${handle} <div class="typing-dots"><span></span><span></span><span></span></div>`;
  document.getElementById('messages-scroll').scrollTop = 99999;
  typingTimeout = setTimeout(hideTyping, 3000);
}

function hideTyping() {
  document.getElementById('typing-ind')?.remove();
}

// ── SHARE ─────────────────────────────────────────────
function copyRoomLink() {
  const url = window.location.href.split('?')[0] + '?room=' + currentRoom;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => toast('ССЫЛКА СКОПИРОВАНА'));
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('ССЫЛКА СКОПИРОВАНА');
  }
}

// ── UTILS ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function showConnStatus(show) {
  document.getElementById('conn-status')?.classList.toggle('show', show);
}

function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = '> ' + msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2700);
}

// ── AUTO-JOIN FROM URL ────────────────────────────────
function checkUrlRoom() {
  const params = new URLSearchParams(window.location.search);
  const room = params.get('room');
  if (room && myHandle) enterRoom(room.toUpperCase());
}

// ── RESTORE SESSION ───────────────────────────────────
const savedHandle = localStorage.getItem('zion_handle');
if (savedHandle) {
  document.getElementById('handle-input').value = savedHandle;
}

// Keyboard scroll fix for iOS
document.getElementById('chat-input').addEventListener('focus', () => {
  setTimeout(() => {
    const s = document.getElementById('messages-scroll');
    if (s) s.scrollTop = s.scrollHeight;
  }, 400);
});
</script>
</body>
